; stunnel config for agent mail TLS relay
; Install with: sudo pacman -S stunnel
; Copy to: /etc/stunnel/stunnel.conf
; Start with: sudo systemctl enable --now stunnel

; Global settings
pid = /run/stunnel/stunnel.pid
socket = l:TCP_NODELAY=1
socket = r:TCP_NODELAY=1

; Generate self-signed cert for LAN use
; sudo stunnel.pem (generates /etc/stunnel/stunnel.pem)

cert = /etc/stunnel/stunnel.pem
key = /etc/stunnel/stunnel.pem

; IMAP TLS relay (local 993 -> remote 143)
[imap-relay]
accept = 993
connect = 192.168.86.218:143
protocol = imap

; SMTP TLS relay (local 465 -> remote 25)
[smtp-relay]
accept = 465
connect = 192.168.86.218:25
protocol = smtp
